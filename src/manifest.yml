manifest_version: 1

version:
  name: V1
  label: Version 1
  comment: Student Class Management App

artifacts:
  setup_script: scripts/setup.sql
  default_streamlit: app_student_schema.student_streamlit
  extension_code: true

references:
  - student_table:
      label: "Student Table"
      description: "Select student table"
      privileges:
        - SELECT
      object_type: Table
      multi_valued: false
      register_callback: app_student_schema.update_reference
